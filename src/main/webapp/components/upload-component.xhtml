<ui:composition xmlns="http://www.w3.org/1999/xhtml" xmlns:h="http://xmlns.jcp.org/jsf/html"
    xmlns:f="http://xmlns.jcp.org/jsf/core" xmlns:ui="http://xmlns.jcp.org/jsf/facelets">

    <div class="upload-area">

        <h:form id="uploadForm" enctype="multipart/form-data">
            <div class="upload-content">
                <!-- Upload Icon -->
                <div class="upload-icon">
                    <span style="font-size: 3rem; line-height: 1;">↑</span>
                </div>

                <h5 class="fw-bold mb-2">Upload PDF</h5>
                <p class="text-muted text-sm mb-4">Click browse, select a PDF, then upload</p>

                <h:inputFile id="fileInput" value="#{uploadBean.file}" styleClass="file-input-hidden"
                    onchange="onFileSelected(this)" accept=".pdf,application/pdf" />

                <button type="button" class="btn browse-btn" onclick="triggerFilePicker()">
                    Browse Files
                </button>

                <div class="selected-file mt-4 p-4" id="selectedFileCard" style="display: none;">
                    <p class="fw-bold mb-1" id="fileName"></p>
                    <small class="text-muted" id="fileSize"></small>
                </div>

                <p class="text-muted text-sm mt-2">Max file size: 20MB</p>

                <!-- Upload Button -->
                <h:commandButton id="uploadBtn" value="Upload Document" action="#{uploadBean.upload}"
                    styleClass="btn btn-primary mt-4 upload-submit" style="display: none;" />

                <!-- Success/Error Messages -->
                <h:messages globalOnly="true" styleClass="alert mt-4" />
            </div>
        </h:form>
    </div>

    <style>
        .upload-area {
            border: 2px dashed var(--border-default);
            border-radius: var(--radius-lg);
            padding: var(--space-8);
            text-align: center;
            background-color: var(--bg-secondary);
            transition: all 0.2s;
            cursor: pointer;
        }

        .upload-icon {
            color: var(--primary);
            margin-bottom: var(--space-4);
        }

        .file-input-hidden {
            position: absolute;
            left: -9999px;
            width: 1px;
            height: 1px;
            opacity: 0;
        }

        .browse-btn {
            min-width: 220px;
            border: 1px solid var(--border-accent);
            background: linear-gradient(135deg, rgba(0, 245, 212, 0.18) 0%, rgba(0, 180, 160, 0.18) 100%);
            color: var(--text-bright);
            box-shadow: 0 8px 30px rgba(0, 245, 212, 0.2);
        }

        .browse-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 12px 35px rgba(0, 245, 212, 0.3);
        }

        .selected-file {
            max-width: 480px;
            margin-left: auto;
            margin-right: auto;
            border-radius: var(--radius-md);
            border: 1px solid var(--border-light);
            background-color: rgba(255, 255, 255, 0.03);
        }

        .upload-submit {
            min-width: 220px;
        }
    </style>
</ui:composition>
