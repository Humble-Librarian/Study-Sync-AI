<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml" xmlns:h="http://xmlns.jcp.org/jsf/html"
      xmlns:f="http://xmlns.jcp.org/jsf/core" xmlns:ui="http://xmlns.jcp.org/jsf/facelets">

<ui:composition template="/WEB-INF/templates/layout.xhtml">
    <f:metadata>
        <f:viewParam name="docName" value="#{chatBean.docName}" />
    </f:metadata>

    <ui:define name="title">Chat - Study-Sync AI</ui:define>

    <ui:define name="content">
        <div class="card card-glass" style="max-width: 980px; margin: 0 auto;">
            <div class="d-flex justify-between align-center mb-4">
                <h:link outcome="/pages/dashboard.xhtml" styleClass="btn btn-secondary">Back</h:link>
                <h2 class="text-xl fw-bold" style="margin: 0;">#{empty chatBean.docName ? 'Document Chat' : chatBean.docName}</h2>
            </div>

            <h:form id="chatForm">
                <h:inputHidden id="docNameHidden" value="#{chatBean.docName}" />

                <h:panelGroup rendered="#{not empty chatBean.errorMessage}">
                    <div class="alert alert-danger mb-4">#{chatBean.errorMessage}</div>
                </h:panelGroup>

                <div class="form-group mb-3">
                    <h:outputLabel for="llmChoice" value="Model Provider" styleClass="form-label"/>
                    <h:selectOneMenu id="llmChoice" value="#{chatBean.llmChoice}" styleClass="form-control">
                        <f:selectItem itemLabel="Groq (Llama 3.3)" itemValue="groq"/>
                        <f:selectItem itemLabel="NVIDIA NIM" itemValue="nim"/>
                    </h:selectOneMenu>
                </div>

                <div class="form-group mb-3">
                    <h:outputLabel for="topK" value="Top Context Chunks" styleClass="form-label"/>
                    <h:inputText id="topK" value="#{chatBean.topK}" styleClass="form-control"/>
                </div>

                <div class="form-group mb-3">
                    <h:outputLabel for="question" value="Ask a Question" styleClass="form-label"/>
                    <h:inputTextarea id="question" value="#{chatBean.userQuery}" styleClass="form-control" rows="4"
                                     placeholder="Type your question about this document..."/>
                </div>

                <div class="d-flex justify-end mb-4">
                    <h:commandButton value="Ask StudySync AI" action="#{chatBean.submitQuery}" styleClass="btn btn-primary"/>
                </div>
            </h:form>

            <h:panelGroup rendered="#{not empty chatBean.answer}">
                <div class="card" style="margin-bottom: var(--space-4);">
                    <h3 class="fw-bold mb-3">Answer</h3>
                    <p style="white-space: pre-wrap; margin: 0;">#{chatBean.answer}</p>
                </div>
            </h:panelGroup>

            <h:panelGroup rendered="#{chatBean.showSources}">
                <div class="card">
                    <h3 class="fw-bold mb-3">Source Pages</h3>
                    <ui:repeat value="#{chatBean.sourcePages}" var="src">
                        <div class="mb-3" style="padding-bottom: var(--space-3); border-bottom: 1px solid var(--border-light);">
                            <div class="d-flex justify-between align-center mb-1">
                                <strong>Page #{src.page}</strong>
                                <span class="badge badge-info">Score: #{src.score}</span>
                            </div>
                            <p style="white-space: pre-wrap; margin: 0;">#{src.text}</p>
                        </div>
                    </ui:repeat>
                </div>
            </h:panelGroup>
        </div>
    </ui:define>
</ui:composition>

</html>
